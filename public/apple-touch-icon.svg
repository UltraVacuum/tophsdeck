<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <!-- Rounded square background -->
  <rect width="180" height="180" rx="36" fill="#f97316"/>
  <!-- Shield body -->
  <path d="M90 22 L150 48 L150 92 Q150 140 90 162 Q30 140 30 92 L30 48 Z"
        fill="#ea580c" stroke="#c2410c" stroke-width="2" stroke-linejoin="round"/>
  <!-- Shield inner highlight -->
  <path d="M90 30 L142 52 L142 92 Q142 134 90 154 Q38 134 38 92 L38 52 Z"
        fill="#fb923c" opacity="0.25"/>
  <!-- Sword blade -->
  <rect x="84" y="36" width="12" height="76" rx="3" fill="white"/>
  <!-- Sword tip -->
  <polygon points="90,24 80,40 100,40" fill="white"/>
  <!-- Sword guard (crossguard) -->
  <rect x="60" y="108" width="60" height="12" rx="4" fill="white"/>
  <!-- Sword grip -->
  <rect x="84" y="120" width="12" height="24" rx="3" fill="white" opacity="0.9"/>
  <!-- Sword pommel -->
  <circle cx="90" cy="150" r="8" fill="white" opacity="0.9"/>
</svg>
