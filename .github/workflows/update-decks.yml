name: Update Decks

on:
  schedule:
    # Every 12 hours at minute 17 (avoid :00 congestion)
    - cron: "17 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-decks:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Fetch latest deck data
        run: node scripts/fetch-decks.mjs
        env:
          NODE_OPTIONS: "--max-old-space-size=2048"

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet src/data/generated/decks.json; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changes:"
            git diff --stat src/data/generated/decks.json
          fi

      - name: Build to verify
        if: steps.check.outputs.has_changes == 'true'
        run: npm run build

      - name: Commit and push
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/generated/decks.json
          NOW=$(date -u '+%Y-%m-%d %H:%M')
          git commit -m "chore: update deck data (${NOW} UTC)"
          git push

      - name: Summary
        if: always()
        run: |
          if [ "${{ steps.check.outputs.has_changes }}" = "true" ]; then
            echo "## ✅ Decks updated" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ℹ️ No changes" >> $GITHUB_STEP_SUMMARY
          fi
          date -u >> $GITHUB_STEP_SUMMARY
