name: Update Deck Data

on:
  schedule:
    # Every 12 hours at minute 17
    - cron: "17 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-decks:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Step 1: Fetch deck data (API-based, no Playwright needed)
      - name: Fetch decks from HearthstoneTopDecks
        run: node scripts/fetch-topdecks-api.mjs --pages 3
        env:
          NODE_OPTIONS: "--max-old-space-size=2048"

      # Step 2: Validate
      - name: Validate merged data
        id: validate
        run: |
          MERGED_COUNT=$(node -e "const d=require('./src/data/generated/decks-merged.json'); console.log(Object.keys(d.archetypes||{}).length)")
          DECK_CODES=$(node -e "const d=require('./src/data/generated/decks-merged.json'); console.log(Object.values(d.archetypes).filter(a=>a.deckCode).length)")
          echo "merged_count=$MERGED_COUNT" >> "$GITHUB_OUTPUT"
          echo "deck_codes=$DECK_CODES" >> "$GITHUB_OUTPUT"
          if [ "$MERGED_COUNT" -lt 5 ]; then
            echo "⚠️ Too few results — skipping commit"
            echo "valid=false" >> "$GITHUB_OUTPUT"
          else
            echo "✅ $MERGED_COUNT archetypes, $DECK_CODES with deck codes"
            echo "valid=true" >> "$GITHUB_OUTPUT"
          fi

      # Step 3: Build to verify
      - name: Build to verify
        if: steps.validate.outputs.valid == 'true'
        run: npm run build

      # Step 4: Commit (snapshot + merged + legacy overlay)
      - name: Commit and push
        if: steps.validate.outputs.valid == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/generated/decks/ src/data/generated/decks-merged.json src/data/generated/topdecks-overlay.json
          if git diff --cached --quiet; then
            echo "ℹ️ No changes to commit"
          else
            NOW=$(date -u '+%Y-%m-%d %H:%M')
            git commit -m "chore: update deck data (${NOW} UTC)"
            git push
          fi

      - name: Summary
        if: always()
        run: |
          VALID="${{ steps.validate.outputs.valid }}"
          if [ "$VALID" = "true" ]; then
            echo "## ✅ Deck data updated (${{ steps.validate.outputs.merged_count }} archetypes, ${{ steps.validate.outputs.deck_codes }} deck codes)" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ⚠️ Scrape returned too few results — skipped" >> $GITHUB_STEP_SUMMARY
          fi
          date -u >> $GITHUB_STEP_SUMMARY
