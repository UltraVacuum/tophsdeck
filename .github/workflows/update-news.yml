name: Update News

on:
  schedule:
    # Every 6 hours at minute 23 (avoid :00 congestion)
    - cron: "23 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest news
        run: node scripts/fetch-news.mjs

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet src/data/generated/news.json; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changes:"
            git diff --stat src/data/generated/news.json
          fi

      - name: Commit and push
        if: steps.check.outputs.has_changes == 'true'
        env:
          COMMIT_DATE: "{{ date -u '+%Y-%m-%d %H:%M' }}"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/generated/news.json
          NOW=$(date -u '+%Y-%m-%d %H:%M')
          git commit -m "chore: update news (${NOW} UTC)"
          git push
